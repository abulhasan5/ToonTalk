<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToonTalk - Realtime Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #f0f3f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: #fff; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Pages Common Style */
        .page { width: 100%; height: 100%; display: none; padding: 20px; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Auth Page Design */
        .auth-bg { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); }
        .logo { font-size: 3rem; color: #ff4757; margin-bottom: 20px; font-weight: bold; text-shadow: 2px 2px #fff; }
        .auth-box { width: 100%; background: rgba(255, 255, 255, 0.9); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; width: 100%; }
        .input-group input { width: 100%; padding: 12px 15px; border: 2px solid #ffccd2; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #ff4757; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: #ff4757; color: white; }
        .btn-link { background: none; color: #ff4757; margin-top: 15px; font-size: 0.9rem; border: none; cursor: pointer; }

        /* Dashboard Page Design */
        .dash-header { width: 100%; background: #ff4757; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; left: 0; z-index: 10; }
        .user-list { width: 100%; margin-top: 70px; overflow-y: auto; height: calc(100% - 70px); padding: 10px; }
        .user-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .online-dot { width: 10px; height: 10px; background: #2ed573; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .call-btn { background: #2ed573; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Calling Screen Design */
        .call-bg { background: #2f3542; color: white; justify-content: space-between; padding: 50px 20px; z-index: 20; }
        .caller-info { text-align: center; margin-top: 50px; }
        .caller-avatar { width: 100px; height: 100px; background: #ff4757; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 3rem; margin: 0 auto 20px; }
        .call-status { color: #a4b0be; font-size: 1.1rem; margin-top: 10px; animation: blink 1.5s infinite; }
        
        /* Call Controls */
        .controls-container { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; width: 100%; }
        .control-circle { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .control-circle.active-ctl { background: #fff; color: #2f3542; }
        .btn-end { background: #ff4757; width: 65px; height: 65px; font-size: 1.5rem; }
        .btn-accept { background: #2ed573; width: 65px; height: 65px; font-size: 1.5rem; }

        @keyframes blink { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="app-container">

    <div id="loginPage" class="page auth-bg active">
        <div class="logo">ToonTalk</div>
        <div class="auth-box">
            <h3 style="margin-bottom: 15px; color: #2f3542;">লগইন করুন</h3>
            <div class="input-group">
                <input type="number" id="loginPhone" placeholder="মোবাইল নম্বর">
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
            </div>
            <button class="btn btn-primary" onclick="login()">প্রবেশ করুন</button>
            <button class="btn btn-link" onclick="switchPage('registerPage')">নতুন অ্যাকাউন্ট তৈরি করুন</button>
        </div>
    </div>

    <div id="registerPage" class="page auth-bg">
        <div class="logo">ToonTalk</div>
        <div class="auth-box">
            <h3 style="margin-bottom: 15px; color: #2f3542;">নতুন অ্যাকাউন্ট</h3>
            <div class="input-group">
                <input type="text" id="regName" placeholder="আপনার নাম">
            </div>
            <div class="input-group">
                <input type="number" id="regPhone" placeholder="মোবাইল নম্বর">
            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="পাসওয়ার্ড">
            </div>
            <button class="btn btn-primary" onclick="register()">নিবন্ধন করুন</button>
            <button class="btn btn-link" onclick="switchPage('loginPage')">ইতিমধ্যে অ্যাকাউন্ট আছে? লগইন</button>
        </div>
    </div>

    <div id="dashPage" class="page">
        <div class="dash-header">
            <h3 id="welcomeText">হ্যালো!</h3>
            <button onclick="logout()" style="background: none; border: none; color: white; font-weight: bold; cursor: pointer;">লগআউট</button>
        </div>
        <div class="user-list" id="usersContainer">
            </div>
    </div>

    <div id="callPage" class="page call-bg">
        <div class="caller-info">
            <div class="caller-avatar"><i class="fa-solid fa-user"></i></div>
            <h2 id="callTargetName">ইউজার</h2>
            <div class="call-status" id="callStatusText">Calling...</div>
        </div>

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="controls-container" id="runningCallControls" style="display: none;">
                <button class="control-circle" id="muteBtn" onclick="toggleMute()"><i class="fa-solid fa-microphone-slash"></i></button>
                <button class="control-circle" id="speakerBtn" onclick="toggleSpeaker()"><i class="fa-solid fa-volume-high"></i></button>
                <button class="control-circle" id="camBtn" onclick="toggleCamera()"><i class="fa-solid fa-video"></i></button>
            </div>

            <div class="controls-container">
                <button class="control-circle btn-accept" id="acceptBtn" onclick="acceptCall()" style="display: none;"><i class="fa-solid fa-phone"></i></button>
                <button class="control-circle btn-end" id="endBtn" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, onValue, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    // আপনার ফায়ারবেস প্রজেক্ট কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyBq9tQNoeJq9jMmME0aaaZRfz-oxfWdQaw",
        authDomain: "toontalk-98d67.firebaseapp.com",
        projectId: "toontalk-98d67",
        storageBucket: "toontalk-98d67.firebasestorage.app",
        messagingSenderId: "774949564999",
        appId: "1:774949564999:web:51084ac4102cbe73ba3762",
        databaseURL: "https://toontalk-98d67-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = null;
    let currentCallId = null;

    window.switchPage = function(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // ওটিপি ছাড়া ডিরেক্ট মোবাইল রেজিস্ট্রেশন
    window.register = function() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const pass = document.getElementById('regPass').value;

        if(!name || !phone || !pass) return alert("দয়া করে সব ঘর পূরণ করুন!");

        const userRef = ref(db, 'users/' + phone);
        get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
                alert("এই নম্বরটি ইতিমধ্যে নিবন্ধিত!");
            } else {
                set(userRef, { name: name, phone: phone, password: pass, status: "offline" }).then(() => {
                    alert("নিবন্ধন সফল হয়েছে! এবার লগইন করুন।");
                    switchPage('loginPage');
                });
            }
        });
    }

    // লগইন প্রসেস
    window.login = function() {
        const phone = document.getElementById('loginPhone').value;
        const pass = document.getElementById('loginPass').value;

        if(!phone || !pass) return alert("নম্বর এবং পাসওয়ার্ড দিন!");

        get(child(ref(db), `users/${phone}`)).then((snapshot) => {
            if (snapshot.exists() && snapshot.val().password === pass) {
                currentUser = snapshot.val();
                document.getElementById('welcomeText').innerText = "হ্যালো, " + currentUser.name;
                update(ref(db, `users/${phone}`), { status: "online" });
                switchPage('dashPage');
                listenForUsers();
                listenForCalls();
            } else {
                alert("আপনার নম্বর বা পাসওয়ার্ড ভুল!");
            }
        });
    }

    // অনলাইন ব্যবহারকারীদের তালিকা লোড করা
    function listenForUsers() {
        onValue(ref(db, 'users'), (snapshot) => {
            const container = document.getElementById('usersContainer');
            container.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const user = childSnapshot.val();
                if(user.phone !== currentUser.phone) {
                    const card = document.createElement('div');
                    card.className = "user-card";
                    card.innerHTML = `
                        <div>
                            <span class="online-dot" style="background: ${user.status === 'online' ? '#2ed573' : '#ccc'}"></span>
                            <strong>${user.name}</strong> (${user.phone})
                        </div>
                        <button class="call-btn" onclick="makeCall('${user.phone}', '${user.name}')">Call</button>
                    `;
                    container.appendChild(card);
                }
            });
        });
    }

    // কল করার ফাংশন
    window.makeCall = function(targetPhone, targetName) {
        currentCallId = currentUser.phone + "_" + targetPhone;
        set(ref(db, 'calls/' + currentCallId), {
            caller: currentUser.phone,
            callerName: currentUser.name,
            receiver: targetPhone,
            status: "calling"
        });
        document.getElementById('callTargetName').innerText = targetName;
        document.getElementById('callStatusText').innerText = "Calling...";
        document.getElementById('runningCallControls').style.display = "none";
        document.getElementById('acceptBtn').style.display = "none";
        switchPage('callPage');
    }

    // কল রিসিভ ও সিগন্যাল মনিটর
    function listenForCalls() {
        onValue(ref(db, 'calls'), (snapshot) => {
            let activeCallFound = false;
            snapshot.forEach((childSnapshot) => {
                const call = childSnapshot.val();
                if(call.receiver === currentUser.phone && call.status === "calling") {
                    activeCallFound = true;
                    currentCallId = childSnapshot.key;
                    document.getElementById('callTargetName').innerText = call.callerName;
                    document.getElementById('callStatusText').innerText = "Incoming Call...";
                    document.getElementById('acceptBtn').style.display = "flex";
                    document.getElementById('runningCallControls').style.display = "none";
                    switchPage('callPage');
                }
                if(currentCallId === childSnapshot.key && call.status === "accepted") {
                    activeCallFound = true;
                    document.getElementById('callStatusText').innerText = "Connected";
                    document.getElementById('runningCallControls').style.display = "flex";
                    document.getElementById('acceptBtn').style.display = "none";
                }
            });
            if(!activeCallFound && document.getElementById('callPage').classList.contains('active')) {
                switchPage('dashPage');
            }
        });
    }

    window.acceptCall = function() {
        update(ref(db, 'calls/' + currentCallId), { status: "accepted" });
    }

    window.endCall = function() {
        if(currentCallId) {
            set(ref(db, 'calls/' + currentCallId), null);
        }
        switchPage('dashPage');
    }

    // মিউট, স্পিকার এবং ক্যামেরা বোতামের টগল
    let isMuted = false, isSpeaker = false, isCam = false;
    window.toggleMute = function() {
        isMuted = !isMuted;
        document.getElementById('muteBtn').classList.toggle('active-ctl', isMuted);
    }
    window.toggleSpeaker = function() {
        isSpeaker = !isSpeaker;
        document.getElementById('speakerBtn').classList.toggle('active-ctl', isSpeaker);
    }
    window.toggleCamera = function() {
        isCam = !isCam;
        document.getElementById('camBtn').classList.toggle('active-ctl', isCam);
    }

    window.logout = function() {
        if(currentUser) update(ref(db, `users/${currentUser.phone}`), { status: "offline" });
        switchPage('loginPage');
    }
</script>
</body>
</html>

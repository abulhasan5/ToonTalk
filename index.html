<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Talk Chat & Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <div id="auth-section" class="flex-1 flex flex-col justify-center items-center px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <h2 id="auth-title" class="text-3xl font-extrabold text-center mb-6 text-gray-800">Welcome to ToonTalk</h2>
            
            <div class="space-y-4">
                <div id="name-box" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" id="auth-name" placeholder="Enter name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
                    <input type="tel" id="auth-phone" placeholder="017XXXXXXXX" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="auth-password" placeholder="******" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition">
                </div>

                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-xl transition duration-300 shadow-md">লগইন করুন</button>
                
                <p class="text-center text-sm text-gray-600 mt-4">
                    <span id="auth-toggle-text">Need an account?</span>
                    <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-red-500 font-bold ml-1 hover:underline">Register</button>
                </p>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden flex-1 flex flex-col h-full">
        <header class="bg-red-500 text-white px-4 py-4 shadow-md flex justify-between items-center sticky top-0 z-50">
            <h1 id="welcome-msg" class="text-lg font-bold">Hello, User</h1>
            <button onclick="logout()" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl text-sm font-bold transition">Logout</button>
        </header>

        <main class="flex-1 overflow-y-auto p-4 space-y-3 max-w-2xl w-full mx-auto" id="user-list">
        </main>
    </div>

    <div id="chat-section" class="hidden flex-1 flex flex-col h-full bg-slate-50">
        <header class="bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <div class="flex items-center space-x-3">
                <button onclick="backToDashboard()" class="text-gray-600 hover:text-gray-800 text-xl p-1">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div>
                    <h3 id="chat-user-name" class="font-bold text-gray-800 text-base">User Name</h3>
                    <p class="text-xs text-green-500 font-medium"><i class="fa-solid fa-circle text-[8px] mr-1"></i>Online</p>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <button onclick="makeCall('audio')" class="w-10 h-10 rounded-full bg-green-50 hover:bg-green-100 text-green-600 flex items-center justify-center transition active:scale-95" title="Audio Call">
                    <i class="fa-solid fa-phone text-lg"></i>
                </button>
                <button onclick="makeCall('video')" class="w-10 h-10 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 flex items-center justify-center transition active:scale-95" title="Video Call">
                    <i class="fa-solid fa-video text-lg"></i>
                </button>
                <button onclick="openProfileModal()" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition active:scale-95" title="Profile">
                    <i class="fa-solid fa-user text-lg"></i>
                </button>
            </div>
        </header>

        <div id="message-container" class="flex-1 overflow-y-auto p-4 space-y-3">
        </div>

        <footer class="bg-white border-t border-gray-200 p-3 flex items-center space-x-2 sticky bottom-0">
            <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 bg-gray-100 px-4 py-3 rounded-full border-none focus:ring-2 focus:ring-red-500 outline-none text-sm transition">
            <button onclick="sendMessage()" class="w-11 h-11 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-md shadow-red-100 transition active:scale-95">
                <i class="fa-solid fa-paper-plane text-sm ml-0.5"></i>
            </button>
        </footer>
    </div>

    <div id="profile-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex justify-center items-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl relative">
            <button onclick="closeProfileModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            <div class="w-20 h-20 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl font-bold">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <h4 id="modal-user-name" class="text-xl font-bold text-gray-800">Name</h4>
            <p id="modal-user-phone" class="text-gray-500 text-sm mt-1">017XXXXXXXX</p>
            <p class="text-xs bg-gray-100 text-gray-600 inline-block px-3 py-1 rounded-full mt-4 border border-gray-200">N-Talk Member</p>
        </div>
    </div>

    <div id="call-screen" class="hidden fixed inset-0 bg-slate-900 z-50 flex flex-col justify-between items-center p-8 text-white">
        <div class="text-center mt-12 space-y-3">
            <div class="w-24 h-24 bg-white/10 rounded-full flex items-center justify-center mx-auto text-4xl shadow-xl backdrop-blur-md">
                <i class="fa-solid fa-user text-white/70"></i>
            </div>
            <h2 id="call-screen-name" class="text-3xl font-bold">User Name</h2>
            <p id="call-screen-status" class="text-red-400 font-medium tracking-wider animate-pulse">Calling...</p>
        </div>

        <div id="video-container" class="hidden w-full max-w-md h-72 bg-black/50 rounded-2xl relative border border-white/10 overflow-hidden shadow-2xl">
            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
            <video id="local-video" autoplay playsinline muted class="absolute bottom-3 right-3 w-28 h-40 object-cover rounded-xl border-2 border-white shadow-md"></video>
        </div>

        <div class="mb-12 w-full max-w-sm flex justify-center items-center space-x-6">
            <button id="call-accept-btn" onclick="acceptCall()" class="hidden w-16 h-16 bg-green-500 hover:bg-green-600 rounded-full flex items-center justify-center shadow-lg shadow-green-900/40 transition active:scale-95 text-2xl">
                <i class="fa-solid fa-phone"></i>
            </button>
            <button id="call-hangup-btn" onclick="hangupCall()" class="w-16 h-16 bg-red-500 hover:bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-900/40 transition active:scale-95 text-2xl">
                <i class="fa-solid fa-phone-slash"></i>
            </button>
        </div>
    </div>

    <audio id="ringtone-audio" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-84.wav" class="hidden"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://toontalk-98d67-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isSignUpMode = false;
        let currentUser = JSON.parse(localStorage.getItem("chat_current_user")) || null;
        let activeChatUserPhone = null;
        
        let localStream = null;
        let peerConnection = null;
        let currentCallRef = null;

        window.onload = function() {
            checkUserSession();
        };

        function checkUserSession() {
            if (currentUser) {
                document.getElementById("auth-section").classList.add("hidden");
                document.getElementById("dashboard-section").classList.remove("hidden");
                document.getElementById("chat-section").classList.add("hidden");
                document.getElementById("welcome-msg").innerText = `Hello, ${currentUser.name}`;
                loadUserList();
                listenForIncomingCalls(); // ইনকামিং কলের জন্য লিসেনার চালু
            } else {
                document.getElementById("auth-section").classList.remove("hidden");
                document.getElementById("dashboard-section").classList.add("hidden");
                document.getElementById("chat-section").classList.add("hidden");
            }
        }

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById("name-box").classList.toggle("hidden", !isSignUpMode);
            document.getElementById("auth-title").innerText = isSignUpMode ? "Register" : "Login";
            document.getElementById("auth-btn").innerText = isSignUpMode ? "Register" : "Login";
            document.getElementById("auth-toggle-text").innerText = isSignUpMode ? "Already have an account?" : "Need an account?";
            document.getElementById("auth-toggle-btn").innerText = isSignUpMode ? "Login" : "Register";
        };

        window.handleAuth = function() {
            const name = document.getElementById("auth-name").value.trim();
            const phone = document.getElementById("auth-phone").value.trim();
            const password = document.getElementById("auth-password").value.trim();

            if (!phone || !password || (isSignUpMode && !name)) {
                alert("Please fill in all details!");
                return;
            }

            const userRef = ref(db, 'users/' + phone);

            if (isSignUpMode) {
                get(userRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        alert("Mobile number already registered!");
                    } else {
                        set(userRef, { name: name, phone: phone, password: password }).then(() => {
                            alert("Registration successful!");
                            currentUser = { name: name, phone: phone };
                            localStorage.setItem("chat_current_user", JSON.stringify(currentUser));
                            checkUserSession();
                        });
                    }
                });
            } else {
                get(userRef).then((snapshot) => {
                    if (snapshot.exists() && snapshot.val().password === password) {
                        currentUser = { name: snapshot.val().name, phone: phone };
                        localStorage.setItem("chat_current_user", JSON.stringify(currentUser));
                        checkUserSession();
                    } else {
                        alert("Invalid phone or password!");
                    }
                });
            }
        };

        function loadUserList() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const userListContainer = document.getElementById("user-list");
                userListContainer.innerHTML = "";
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const user = childSnapshot.val();
                        if (user.phone !== currentUser.phone) {
                            const userCard = document.createElement("div");
                            userCard.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center hover:shadow-md transition";
                            userCard.innerHTML = `
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 bg-red-100 text-red-500 font-bold rounded-full flex items-center justify-center text-sm">
                                        ${user.name.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-gray-800">${user.name}</h4>
                                        <p class="text-xs text-gray-500">${user.phone}</p>
                                    </div>
                                </div>
                                <button onclick="openChat('${user.phone}', '${user.name}')" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-4 py-2.5 rounded-xl transition shadow-sm active:scale-95">
                                    <i class="fa-solid fa-message mr-1"></i> Message
                                </button>
                            `;
                            userListContainer.appendChild(userCard);
                        }
                    });
                } else {
                    userListContainer.innerHTML = `<p class="text-center text-gray-500 py-8">No users found.</p>`;
                }
            });
        }

        window.openChat = function(phone, name) {
            activeChatUserPhone = phone;
            document.getElementById("dashboard-section").classList.add("hidden");
            document.getElementById("chat-section").classList.remove("hidden");
            document.getElementById("chat-user-name").innerText = name;
            loadMessages();
        };

        window.backToDashboard = function() {
            activeChatUserPhone = null;
            document.getElementById("chat-section").classList.add("hidden");
            document.getElementById("dashboard-section").classList.remove("hidden");
        };

        function loadMessages() {
            const chatRoomId = currentUser.phone < activeChatUserPhone ? 
                               `${currentUser.phone}_${activeChatUserPhone}` : 
                               `${activeChatUserPhone}_${currentUser.phone}`;

            const messagesRef = ref(db, 'messages/' + chatRoomId);
            
            onValue(messagesRef, (snapshot) => {
                const container = document.getElementById("message-container");
                container.innerHTML = "";

                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const msgData = childSnapshot.val();
                        const isMe = msgData.sender === currentUser.phone;

                        const msgRow = document.createElement("div");
                        msgRow.className = `flex ${isMe ? 'justify-end' : 'justify-start'} mb-1`;

                        msgRow.innerHTML = `
                            <div class="max-w-[75%] px-4 py-2.5 rounded-2xl text-sm shadow-sm ${
                                isMe ? 'bg-red-500 text-white rounded-br-none' : 'bg-white text-gray-800 border border-gray-100 rounded-bl-none'
                            }">
                                <p>${msgData.message}</p>
                            </div>
                        `;
                        container.appendChild(msgRow);
                    });
                    container.scrollTop = container.scrollHeight;
                } else {
                    container.innerHTML = `<p class="text-center text-gray-400 text-xs py-12">No messages yet. Say Hi!</p>`;
                }
            });
        }

        window.sendMessage = function() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text) return;

            const chatRoomId = currentUser.phone < activeChatUserPhone ? 
                               `${currentUser.phone}_${activeChatUserPhone}` : 
                               `${activeChatUserPhone}_${currentUser.phone}`;

            const messagesRef = ref(db, 'messages/' + chatRoomId);
            const newMessageRef = push(messagesRef);

            set(newMessageRef, {
                sender: currentUser.phone,
                message: text,
                timestamp: Date.now()
            }).then(() => {
                input.value = "";
            });
        };

        // =======================================================
        // ============ রিয়েল-টাইম কলিং ব্যাকএন্ড সিস্টেম ============
        // =======================================================
        
        // আউটগোয়িং কল করার লজিক (Call Init)
       window.makeCall = async function(type) {
    let chatHeader = document.getElementById("chat-user-name").innerText;
    let receiverName = chatHeader.split(' ')[0]; 
    
    document.getElementById("call-screen-name").innerText = receiverName;
    document.getElementById("call-screen-status").innerText = "Ringing...";
    document.getElementById("call-accept-btn").classList.add("hidden");
    document.getElementById("call-screen").classList.remove("hidden");
    
    if(type === 'video') {
        document.getElementById("video-container").classList.remove("hidden");
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById("local-video").srcObject = localStream;
        } catch (e) {
            console.error("Camera access denied", e);
        }
    } else {
        document.getElementById("video-container").classList.add("hidden");
    }

    currentCallRef = ref(db, 'calls/' + activeChatUserPhone);
    set(currentCallRef, {
        caller: currentUser.phone,
        callerName: currentUser.name,
        type: type,
        status: 'ringing'
    });

    onValue(currentCallRef, (snapshot) => {
        if (snapshot.exists()) {
            const callData = snapshot.val();
            if (callData.status === 'accepted') {
                document.getElementById("call-screen-status").innerText = "Connected";
            }
        } else {
            stopStreamAndClose();
        }
    });
};

function listenForIncomingCalls() {
    const incomingCallRef = ref(db, 'calls/' + currentUser.phone);
    onValue(incomingCallRef, async (snapshot) => {
        if (snapshot.exists()) {
            const callData = snapshot.val();
            if (callData.status === 'ringing') {
                document.getElementById("call-screen-name").innerText = callData.callerName;
                document.getElementById("call-screen-status").innerText = `Incoming ${callData.type} Call...`;
                document.getElementById("call-accept-btn").classList.remove("hidden");
                document.getElementById("call-screen").classList.remove("hidden");

                if(callData.type === 'video') {
                    document.getElementById("video-container").classList.remove("hidden");
                } else {
                    document.getElementById("video-container").classList.add("hidden");
                }

                document.getElementById("ringtone-audio").play().catch(e => {});
            }
        } else {
            stopStreamAndClose();
        }
    });
                                }
        // কল রিসিভ বা একসেপ্ট করার লজিক
        window.acceptCall = async function() {
            document.getElementById("ringtone-audio").pause();
            const incomingCallRef = ref(db, 'calls/' + currentUser.phone);
            
            get(incomingCallRef).then(async (snapshot) => {
                if(snapshot.exists()) {
                    const callData = snapshot.val();
                    set(incomingCallRef, { ...callData, status: 'accepted' });
                    document.getElementById("call-screen-status").innerText = "Connected";
                    document.getElementById("call-accept-btn").classList.add("hidden");

                    if(callData.type === 'video') {
                        try {
                            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                            document.getElementById("local-video").srcObject = localStream;
                        } catch(e) { console.error(e); }
                    }
                }
            });
        };

        // কল ডিসকানেক্ট বা কাটার লজিক
        window.hangupCall = function() {
            document.getElementById("ringtone-audio").pause();
            const targetPhone = activeChatUserPhone || currentUser.phone;
            if(targetPhone) {
                remove(ref(db, 'calls/' + targetPhone));
            }
            stopStreamAndClose();
        };

        function stopStreamAndClose() {
            document.getElementById("ringtone-audio").pause();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            document.getElementById("call-screen").classList.add("hidden");
            document.getElementById("local-video").srcObject = null;
        }

        window.openProfileModal = function() {
            document.getElementById("modal-user-name").innerText = document.getElementById("chat-user-name").innerText;
            document.getElementById("modal-user-phone").innerText = activeChatUserPhone;
            document.getElementById("profile-modal").classList.remove("hidden");
        };

        window.closeProfileModal = function() {
            document.getElementById("profile-modal").classList.add("hidden");
        };

        window.logout = function() {
            localStorage.removeItem("chat_current_user");
            currentUser = null;
            checkUserSession();
        };
    </script>
</body>
</html>
